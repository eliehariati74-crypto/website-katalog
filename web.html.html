<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Katalog Kenangan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .admin-box {
      text-align: center;
      margin-bottom: 20px;
      display: none;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: relative;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card button {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .caption {
      padding: 10px;
      font-size: 14px;
    }

    .login-box {
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<h1>📸 Katalog Kenangan</h1>

<div class="login-box">
  <input type="password" id="password" placeholder="Masukkan password admin">
  <button onclick="login()">Login Admin</button>
</div>

<div class="admin-box" id="adminBox">
  <input type="file" id="fileInput" accept="image/*">
  <br>
  <input type="text" id="captionInput" placeholder="Tulis kenangan...">
  <br><br>
  <button onclick="uploadPhoto()">Upload</button>
</div>

<div class="gallery" id="gallery"></div>

<script>
  const ADMIN_PASSWORD = "12345"; // ganti sesuai keinginan
  let isAdmin = false;

  let photos = JSON.parse(localStorage.getItem('photos')) || [];

  function login() {
    const input = document.getElementById('password').value;
    if (input === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('adminBox').style.display = 'block';
      alert('Login berhasil!');
      renderGallery();
    } else {
      alert('Password salah!');
    }
  }

  function saveToStorage() {
    localStorage.setItem('photos', JSON.stringify(photos));
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';

    photos.forEach((photo, index) => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <img src="${photo.image}" />
        ${isAdmin ? `<button onclick="deletePhoto(${index})">X</button>` : ''}
        <div class="caption">${photo.caption}</div>
      `;

      gallery.appendChild(card);
    });
  }

  function uploadPhoto() {
    const fileInput = document.getElementById('fileInput');
    const captionInput = document.getElementById('captionInput');

    const file = fileInput.files[0];
    const caption = captionInput.value;

    if (!file) {
      alert('Pilih foto dulu!');
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      photos.push({
        image: e.target.result,
        caption: caption
      });

      saveToStorage();
      renderGallery();

      fileInput.value = '';
      captionInput.value = '';
    }

    reader.readAsDataURL(file);
  }

  function deletePhoto(index) {
    photos.splice(index, 1);
    saveToStorage();
    renderGallery();
  }

  renderGallery();
</script>

</body>
</html>
